services:
  antidote:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: antidote-app
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      SQLITE_PATH: /data/antidote.sqlite
    # Persist SQLite database in a dedicated host directory.
    volumes:
      - ./data:/data
    restart: unless-stopped

